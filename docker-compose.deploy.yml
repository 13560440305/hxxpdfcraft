# hxxpdfcraft 生产部署：从 GitHub 构建，hxxnet 网络，暴露 3000 端口
# 用法:
#   docker network create hxxnet    # 首次部署前执行一次（已存在可跳过）
#   docker compose -f docker-compose.deploy.yml up -d --build
#   docker compose -f docker-compose.deploy.yml down

services:
  hxxpdf:
    build:
      context: .
      dockerfile: Dockerfile.deploy
      args:
        GIT_REPO: https://github.com/13560440305/hxxpdfcraft.git
        GIT_BRANCH: main
        # 子路径部署时取消注释，例如 BASE_PATH: /pdfcraft
        # BASE_PATH: ""
    image: hxxpdf:latest
    container_name: hxxpdf
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - hxxnet

networks:
  # 使用已存在的 hxxnet，避免与手动/旧版 compose 创建的网络标签冲突
  hxxnet:
    name: hxxnet
    external: true
